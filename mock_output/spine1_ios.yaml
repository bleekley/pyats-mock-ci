configure:
  commands:
    end:
      new_state: execute
    line console 0:
      new_state: configure_line
    no logging console: ''
  prompt: spine1(config)#
configure_line:
  commands:
    end:
      new_state: execute
    exec-timeout 0: ''
  prompt: spine1(config-line)#
connect:
  commands:
    ? ''
    : new_state: execute
  preface: 'Trying mock_device ...

    Connected to mock_device.

    Escape character is ''^]''.'
  prompt: ''
disconnect:
  commands:
    null: null
  prompt: spine1#
execute:
  commands:
    config term:
      new_state: configure
    config-transaction:
      new_state: configure
    show ip interface brief: "Interface              IP-Address      OK? Method Status\
      \                Protocol\r\nEthernet0/0            198.18.250.87   YES manual\
      \ up                    up      \r\nEthernet0/1            10.0.1.0        YES\
      \ TFTP   up                    up      \r\nEthernet0/2            10.0.2.0 \
      \       YES TFTP   up                    up      \r\nEthernet0/3           \
      \ unassigned      YES unset  administratively down down    \r\nLoopback0   \
      \           1.1.1.1         YES TFTP   up                    up"
    show ip ospf neighbor: "\r\nNeighbor ID     Pri   State           Dead Time  \
      \ Address         Interface\r\n22.22.22.22       0   FULL/  -        00:00:32\
      \    10.0.2.1        Ethernet0/2\r\n11.11.11.11       0   FULL/  -        00:00:37\
      \    10.0.1.1        Ethernet0/1"
    show ip route: "Codes: L - local, C - connected, S - static, R - RIP, M - mobile,\
      \ B - BGP\r\n       D - EIGRP, EX - EIGRP external, O - OSPF, IA - OSPF inter\
      \ area \r\n       N1 - OSPF NSSA external type 1, N2 - OSPF NSSA external type\
      \ 2\r\n       E1 - OSPF external type 1, E2 - OSPF external type 2, m - OMP\r\
      \n       n - NAT, Ni - NAT inside, No - NAT outside, Nd - NAT DIA\r\n      \
      \ i - IS-IS, su - IS-IS summary, L1 - IS-IS level-1, L2 - IS-IS level-2\r\n\
      \       ia - IS-IS inter area, * - candidate default, U - per-user static route\r\
      \n       H - NHRP, G - NHRP registered, g - NHRP registration summary\r\n  \
      \     o - ODR, P - periodic downloaded static route, l - LISP\r\n       a -\
      \ application route\r\n       + - replicated route, % - next hop override, p\
      \ - overrides from PfR\r\n       & - replicated local route overrides by connected\r\
      \n\r\nGateway of last resort is 198.18.250.254 to network 0.0.0.0\r\n\r\nS*\
      \    0.0.0.0/0 [1/0] via 198.18.250.254\r\n      1.0.0.0/32 is subnetted, 1\
      \ subnets\r\nC        1.1.1.1 is directly connected, Loopback0\r\n      2.0.0.0/32\
      \ is subnetted, 1 subnets\r\nO        2.2.2.2 [110/21] via 10.0.2.1, 1w4d, Ethernet0/2\r\
      \n                 [110/21] via 10.0.1.1, 1w4d, Ethernet0/1\r\n      10.0.0.0/8\
      \ is variably subnetted, 6 subnets, 2 masks\r\nC        10.0.1.0/31 is directly\
      \ connected, Ethernet0/1\r\nL        10.0.1.0/32 is directly connected, Ethernet0/1\r\
      \nC        10.0.2.0/31 is directly connected, Ethernet0/2\r\nL        10.0.2.0/32\
      \ is directly connected, Ethernet0/2\r\nO        10.0.3.0/31 [110/20] via 10.0.1.1,\
      \ 1w4d, Ethernet0/1\r\nO        10.0.4.0/31 [110/20] via 10.0.2.1, 1w4d, Ethernet0/2\r\
      \n      11.0.0.0/32 is subnetted, 1 subnets\r\nO        11.11.11.11 [110/11]\
      \ via 10.0.1.1, 1w4d, Ethernet0/1\r\n      22.0.0.0/32 is subnetted, 1 subnets\r\
      \nO        22.22.22.22 [110/11] via 10.0.2.1, 1w4d, Ethernet0/2\r\n      198.18.250.0/24\
      \ is variably subnetted, 2 subnets, 2 masks\r\nC        198.18.250.0/24 is directly\
      \ connected, Ethernet0/0\r\nL        198.18.250.87/32 is directly connected,\
      \ Ethernet0/0"
    show version: ''
    show version | include operating mode: ''
    term length 0: ''
    term width 0: ''
  prompt: spine1#
